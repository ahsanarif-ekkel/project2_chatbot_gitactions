name: Build and Deploy to Minikube

on:
  push:
    branches:
      - main

env:
  DEPLOYMENT_NAME: gpt-deploy
  CONTAINER_NAME: gptcontainer
  IMAGE: my-app  # Your current image name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE:$GITHUB_SHA .

      # Step 3: Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.30.0'

      # Step 4: Deploy to Minikube
      - name: Deploy to Minikube
        run: |
          # Make sure kubectl is pointing to your Minikube cluster
          kubectl config use-context minikube
          
          # Update the deployment image
          kubectl set image deployment/$DEPLOYMENT_NAME $CONTAINER_NAME=$IMAGE:$GITHUB_SHA

          # Wait for rollout to complete
          kubectl rollout status deployment/$DEPLOYMENT_NAME

          # Verify pods are running
          kubectl get pods -o wide
